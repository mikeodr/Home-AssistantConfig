homeassistant:
  auth_providers:
    - type: homeassistant
  packages: !include_dir_named packages
  customize: !include customize.yaml

http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 172.30.33.0/24 # Addon Subnet
    - 127.0.0.1 # Addon proxy

default_config:
bluetooth:
cloud:
stream:
wake_on_lan:

prometheus:
  namespace: hass

automation ui: !include automations.yaml
group: !include config/groups.yaml
input_boolean: !include config/input_boolean.yaml
notify: !include config/notify.yaml
script: !include_dir_merge_named scripts/

adaptive_lighting:

wemo:
  static:
    - 192.168.1.229

# Restore Developer Tools to sidebar
panel_custom:
  - name: developer-tools
    sidebar_title: Developer Tools
    sidebar_icon: mdi:hammer
    url_path: developer-tools
    module_url: /api/hassio/app/entrypoint.js
    embed_iframe: true
    require_admin: true
    config:
      _panel_custom_continuous: true